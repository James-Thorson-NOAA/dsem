on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck", "knitr", "rmarkdown"))
          install.packages("Matrix", type = "source")
          install.packages("igraph", type = "source")
          install.packages("TMB", type = "source")
          remotes::install_deps(dependencies = TRUE, type = "source")
        shell: Rscript {0}

      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "warning")
        shell: Rscript {0}

  san-check:
    runs-on: ubuntu-latest
    container:
      image: wch1/r-debug
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev

      - name: Install R dependencies
        run: |
          RDsan -e "install.packages('remotes')"
          RDsan -e "install.packages('Matrix', type = 'source')"
          RDsan -e "install.packages('igraph', type = 'source')"
          RDsan -e "install.packages('TMB', type = 'source')"
          RDsan -e "remotes::install_deps(dependencies = TRUE, type = 'source')"

      - name: Build package
        run: |
          R CMD build .
          PKG_TGZ=$(ls *.tar.gz)
          echo "PKG_TGZ=$PKG_TGZ" >> $GITHUB_ENV

      - name: Run R CMD check with sanitizers
        run: |
          RDsan CMD check --no-manual --no-vignettes --as-cran ${{ env.PKG_TGZ }}

      - name: Show check output on failure
        if: failure()
        run: |
          find . -name '*.Rout' -o -name '*.fail' | xargs cat