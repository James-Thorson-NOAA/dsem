# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:  # adds manual trigger button

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies Ubuntu
        if: runner.os == 'Linux'
        run: |
          install.packages('remotes')
          remotes::install_deps(dependencies = TRUE)
          remotes::install_cran("knitr")
          remotes::install_cran("rmarkdown")
          remotes::install_cran("rcmdcheck")
          install.packages("Matrix", type = "source")
          install.packages("TMB", type = "source")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2  
        with:
          extra-packages: |
            any::rcmdcheck
            any::knitr
            any::rmarkdown
          needs: check

      - uses: r-lib/actions/check-r-package@v2

  san-check:
    runs-on: ubuntu-latest
    container:
      image: wch1/r-debug  # R built with ASAN+UBSAN enabled
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R package dependencies
        run: |
          RDsan -e "install.packages('remotes')"
          RDsan -e "remotes::install_deps(dependencies = TRUE)"
          RDsan -e "install.packages('Matrix', type = 'source')"
          RDsan -e "install.packages('TMB', type = 'source')"

      - name: Build package
        run: |
          R CMD build .
          PKG_TGZ=$(ls *.tar.gz)
          echo "PKG_TGZ=$PKG_TGZ" >> $GITHUB_ENV

      - name: Run R CMD check with sanitizers
        run: |
          RDsan CMD check --no-manual --no-vignettes --as-cran ${{ env.PKG_TGZ }}

      - name: Show check output on failure
        if: failure()
        run: |
          find . -name '*.Rout' -o -name '*.fail' | xargs cat