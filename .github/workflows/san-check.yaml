name: sanitizers

on:
  workflow_dispatch:
  push:
    branches: [main, dev]

jobs:
  san-check:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/r-hub/containers/gcc13:latest

    env:
      UBSAN_OPTIONS: print_stacktrace=1
      ASAN_OPTIONS: detect_leaks=0

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          R -q -e 'install.packages("pak")'
          R -q -e 'pak::pkg_install(c("local::.", "rcmdcheck", "knitr", "rmarkdown"))'

      - name: Run check
        run: |
          R -q -e 'rcmdcheck::rcmdcheck(args = c("--no-manual", "--no-vignettes", "--no-build-vignettes"), error_on = "warning")'